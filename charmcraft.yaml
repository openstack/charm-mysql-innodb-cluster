type: charm

parts:
  charm:
    plugin: reactive
    reactive-charm-build-arguments:
      - --binary-wheels-from-source
      - --verbose
    build-packages:
    - tox
    - git
    - python3-dev
    - libffi-dev
    - libmysqlclient-dev
    - pkg-config
    source: src/
    build-snaps:
    - charm/latest/edge
    build-environment:
    - CHARM_INTERFACES_DIR: $CRAFT_PROJECT_DIR/interfaces/
    - CHARM_LAYERS_DIR: $CRAFT_PROJECT_DIR/layers/

platforms:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@24.04:ppc64el:
  ubuntu@24.04:s390x:

